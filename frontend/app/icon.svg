<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sk-logo-gradient-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="sk-logo-gradient-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="sk-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="24" fill="#0b0f19" />
  
  <g transform="scale(3.125)">
    <!-- Dashed outer tech path -->
    <path
      d="M28 6H8.5L6.5 2H2"
      stroke="rgba(255,255,255,0.15)"
      stroke-width="1.5"
      stroke-linecap="round"
    />
    <circle cx="9" cy="28" r="2" fill="url(#sk-logo-gradient-1)" />
    <circle cx="25" cy="28" r="2" fill="url(#sk-logo-gradient-1)" />

    <!-- Shopping Cart Body -->
    <path
      d="M8.5 6L11 16H23"
      stroke="url(#sk-logo-gradient-1)"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#sk-glow)"
    />
    
    <!-- S-curve inside the cart -->
    <path
      d="M13 9C14 7.5 16 7 17.5 8C19 9 19.5 11 18 12.5C16.5 14 13 14 12 16C11 18 12.5 20 14.5 20.5C16.5 21 18.5 20.2 19.5 18.5"
      stroke="url(#sk-logo-gradient-2)"
      stroke-width="2.5"
      stroke-linecap="round"
      filter="url(#sk-glow)"
    />
    
    <!-- K-diagonal line to complete the SK mark -->
    <path
      d="M21 9L15.5 14.5L21.5 20"
      stroke="url(#sk-logo-gradient-1)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#sk-glow)"
    />
  </g>
</svg>
