services:
  - type: web
    name: softcomerce-backend
    runtime: python
    pythonVersion: "3.11.9"
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
